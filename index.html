<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanrunming AI - Secure Edition</title>
    <style>
        /* 保持原有的极简暗黑风格 */
        :root { --bg-color: #000000; --text-main: #ffffff; --text-muted: #888888; --border-color: #333333; }
        body { margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-main); font-family: -apple-system, sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        nav { padding: 24px 48px; font-weight: 600; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        main { display: grid; grid-template-columns: 1fr 1fr; flex: 1; }
        .input-section { padding: 64px 48px; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        h1 { font-size: 48px; margin: 0 0 16px 0; }
        p.subtitle { color: var(--text-muted); font-size: 18px; margin-bottom: 40px; }
        .form-group { margin-bottom: 24px; }
        label { display: block; font-size: 14px; color: var(--text-muted); margin-bottom: 8px; }
        input { width: 100%; background: transparent; border: 1px solid var(--border-color); color: var(--text-main); padding: 16px; border-radius: 4px; box-sizing: border-box; }
        button { background-color: var(--text-main); color: var(--bg-color); border: none; padding: 18px; font-weight: 600; border-radius: 4px; cursor: pointer; margin-top: 16px; }
        button:disabled { background-color: #333; color: #666; cursor: not-allowed; }
        .output-section { padding: 64px 48px; display: flex; align-items: center; justify-content: center; background-color: #050505; }
        .image-container { width: 100%; max-width: 500px; aspect-ratio: 2/3; border: 1px dashed var(--border-color); display: flex; align-items: center; justify-content: center; color: var(--text-muted); border-radius: 8px; overflow: hidden;}
        .image-container img { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        /* 鉴权状态 UI */
        #auth-status { font-size: 14px; color: #4caf50; display: none; }
        .overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; padding: 48px; text-align: center;}
    </style>
</head>
<body>

    <nav>
        <span>Hanrunming AI</span>
        <span id="auth-status">✅ 已授权，准备就绪</span>
    </nav>

    <main>
        <div class="input-section" style="position: relative;">
            
            <div id="loginOverlay" class="overlay">
                <h2>安全验证</h2>
                <p class="subtitle" style="margin-bottom: 24px;">为了保护接口安全，请先使用您的扣子账号进行安全授权。</p>
                <button onclick="startPKCEAuth()" style="width: 200px;">🚀 点击授权登录</button>
            </div>

            <h1>Create<br>Poster.</h1>
            <p class="subtitle">输入核心参数，基于底层大模型的视觉引擎将为您自动构建高分辨率资产。</p>

            <div class="form-group"><label>产品名称</label><input type="text" id="product_name" value="东亚银行个人大额存单"></div>
            <div class="form-group"><label>核心数据</label><input type="text" id="interest_rate" value="2.00%"></div>
            <div class="form-group"><label>产品期限</label><input type="text" id="product_period" value="二年期"></div>
            <div class="form-group"><label>起存金额</label><input type="text" id="start_amount" value="人民币20万元起"></div>

            <button id="generateBtn" onclick="generatePoster()">Generate Image</button>
        </div>

        <div class="output-section">
            <div class="image-container">
                <span id="placeholderText">IMAGE PREVIEW</span>
                <img id="resultImage" alt="Generated Poster">
            </div>
        </div>
    </main>

    <script>
        // ==========================================
        // 核心配置区：填入你在扣子后台申请的 Client ID
        // ==========================================
        const CLIENT_ID = '1112616983633'; 
        // 自动获取当前网页地址作为重定向地址 (必须与后台配置的完全一致)
        const REDIRECT_URI = window.location.origin + window.location.pathname; 
        
        let globalAccessToken = '';

        // --- PKCE 加密算法工具 (浏览器原生) ---
        function generateRandomString(length = 64) {
            const array = new Uint32Array(length);
            window.crypto.getRandomValues(array);
            return Array.from(array, dec => ('0' + dec.toString(16)).substr(-2)).join('');
        }

        async function generateCodeChallenge(codeVerifier) {
            const encoder = new TextEncoder();
            const data = encoder.encode(codeVerifier);
            const digest = await window.crypto.subtle.digest('SHA-256', data);
            return btoa(String.fromCharCode.apply(null, new Uint8Array(digest)))
                .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }

        // --- 步骤 1：发起授权 (点击按钮时触发) ---
        async function startPKCEAuth() {
            const codeVerifier = generateRandomString();
            sessionStorage.setItem('code_verifier', codeVerifier); // 暂存，换Token时要用
            const codeChallenge = await generateCodeChallenge(codeVerifier);
            
            // 构造跳转到扣子的授权链接
            const authUrl = `https://www.coze.cn/api/permission/oauth2/authorize?response_type=code&client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&code_challenge=${codeChallenge}&code_challenge_method=S256`;
            
            window.location.href = authUrl; // 页面跳转
        }

        // --- 步骤 2：处理回调并换取 Token (页面加载时执行) ---
        async function handleAuthCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            
            if (code) {
                // 如果地址栏有 code，说明刚从扣子授权回来
                document.getElementById('loginOverlay').innerHTML = '<h2>正在验证身份...</h2>';
                const codeVerifier = sessionStorage.getItem('code_verifier');
                
                try {
                    // 拿 code 和 verifier 去换真实的 Access Token
                    const response = await fetch('https://api.coze.cn/api/permission/oauth2/token', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            client_id: CLIENT_ID,
                            grant_type: 'authorization_code',
                            code: code,
                            redirect_uri: REDIRECT_URI,
                            code_verifier: codeVerifier
                        })
                    });
                    
                    const data = await response.json();
                    if (data.access_token) {
                        globalAccessToken = data.access_token;
                        // 隐藏遮罩层，显示正常表单
                        document.getElementById('loginOverlay').style.display = 'none';
                        document.getElementById('auth-status').style.display = 'inline';
                        // 清理地址栏，让它变干净
                        window.history.replaceState({}, document.title, REDIRECT_URI);
                    } else {
                        alert('获取 Token 失败，请重新授权。');
                    }
                } catch (e) {
                    console.error('鉴权错误:', e);
                    alert('网络错误，无法换取令牌。');
                }
            }
        }

        // 页面一加载就检查是不是带了授权码回来
        window.onload = handleAuthCallback;

        // --- 步骤 3：正常调用工作流生图 (使用换来的合法 Token) ---
        async function generatePoster() {
            if (!globalAccessToken) {
                alert("请先完成授权登录！");
                return;
            }

            const btn = document.getElementById('generateBtn');
            const placeholder = document.getElementById('placeholderText');
            const resultImg = document.getElementById('resultImage');
            btn.disabled = true; btn.innerText = 'Processing...';

            const payload = {
                product_name: document.getElementById('product_name').value,
                interest_rate: document.getElementById('interest_rate').value,
                product_period: document.getElementById('product_period').value,
                start_amount: document.getElementById('start_amount').value,
                custom_prompt: `一张高端商业银行海报。画面右侧是一位面带从容微笑的优雅亚洲女性，坐在飞机头等舱。左上角写着粗体大字“${document.getElementById('product_name').value}”，紧接着是巨大的红色加粗数字“${document.getElementById('interest_rate').value}”。8K超高清。`
            };

            try {
                // 注意：这里要确保你的工作流接口地址是正确的
                const response = await fetch('https://tcrnh58yq5.coze.site/run', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${globalAccessToken}`, // 用合法的短期 Token
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                console.log("接口返回:", data);

                let imageUrl = data.data?.output_image || data.output_image;
                if (imageUrl) {
                    resultImg.src = imageUrl;
                    resultImg.style.display = 'block';
                    placeholder.style.display = 'none';
                } else {
                    alert("未找到图片链接，请按 F12 检查控制台。");
                }
            } catch (error) {
                alert('生图请求失败：' + error.message);
            } finally {
                btn.disabled = false; btn.innerText = 'Generate Image';
            }
        }
    </script>
</body>
</html>
