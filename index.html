<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanrunming AI - Secure Edition</title>
    <style>
        :root { --bg-color: #000000; --text-main: #ffffff; --text-muted: #888888; --border-color: #333333; }
        body { margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-main); font-family: -apple-system, sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        nav { padding: 24px 48px; font-weight: 600; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        main { display: grid; grid-template-columns: 1fr 1fr; flex: 1; }
        .input-section { padding: 64px 48px; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; position: relative; }
        h1 { font-size: 48px; margin: 0 0 16px 0; }
        p.subtitle { color: var(--text-muted); font-size: 18px; margin-bottom: 40px; }
        .form-group { margin-bottom: 24px; }
        label { display: block; font-size: 14px; color: var(--text-muted); margin-bottom: 8px; }
        input { width: 100%; background: transparent; border: 1px solid var(--border-color); color: var(--text-main); padding: 16px; border-radius: 4px; box-sizing: border-box; }
        button { background-color: var(--text-main); color: var(--bg-color); border: none; padding: 18px; font-weight: 600; border-radius: 4px; cursor: pointer; margin-top: 16px; font-size: 16px; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        button:disabled { background-color: #333; color: #666; cursor: not-allowed; }
        .output-section { padding: 64px 48px; display: flex; align-items: center; justify-content: center; background-color: #050505; }
        .image-container { width: 100%; max-width: 500px; aspect-ratio: 2/3; border: 1px dashed var(--border-color); display: flex; align-items: center; justify-content: center; color: var(--text-muted); border-radius: 8px; overflow: hidden; position: relative; }
        .image-container img { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        #auth-status { font-size: 14px; color: #4caf50; display: none; }
        .overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; padding: 48px; text-align: center; backdrop-filter: blur(4px); }
    </style>
</head>
<body>

    <nav>
        <span>Hanrunming AI</span>
        <span id="auth-status">✅ 已授权，准备就绪</span>
    </nav>

    <main>
        <div class="input-section">
            
            <div id="loginOverlay" class="overlay">
                <h2>安全验证</h2>
                <p class="subtitle" style="margin-bottom: 24px; font-size: 15px;">为了保护接口安全，请先使用扣子账号进行授权。</p>
                <button onclick="startPKCEAuth()" style="width: 220px;">🚀 点击授权登录</button>
            </div>

            <h1>Create<br>Poster.</h1>
            <p class="subtitle">输入核心参数，基于底层大模型的视觉引擎将为您自动构建高分辨率资产。</p>

            <div class="form-group"><label>产品名称</label><input type="text" id="product_name" value="东亚银行个人大额存单"></div>
            <div class="form-group"><label>核心数据</label><input type="text" id="interest_rate" value="2.00%"></div>
            <div class="form-group"><label>产品期限</label><input type="text" id="product_period" value="二年期"></div>
            <div class="form-group"><label>起存金额</label><input type="text" id="start_amount" value="人民币20万元起"></div>

            <button id="generateBtn" onclick="generatePoster()">Generate Image</button>
        </div>

        <div class="output-section">
            <div class="image-container">
                <span id="placeholderText">IMAGE PREVIEW</span>
                <img id="resultImage" alt="Generated Poster">
            </div>
        </div>
    </main>

    <script>
        // ==========================================
        // 1. 核心配置区
        // ==========================================
        const CLIENT_ID = '80405530125690269781374913391394.app.coze'; 
        const WORKFLOW_ID = '1112616983633'; // 你的工作流 ID
        
        // 自动获取当前网页的纯净地址作为回调地址
        const REDIRECT_URI = window.location.origin + window.location.pathname; 
        
        let globalAccessToken = '';

        // ==========================================
        // 2. PKCE 核心加密算法
        // ==========================================
        function generateRandomString(length = 64) {
            const array = new Uint32Array(length);
            window.crypto.getRandomValues(array);
            return Array.from(array, dec => ('0' + dec.toString(16)).substr(-2)).join('');
        }

        async function generateCodeChallenge(codeVerifier) {
            const encoder = new TextEncoder();
            const data = encoder.encode(codeVerifier);
            const digest = await window.crypto.subtle.digest('SHA-256', data);
            return btoa(String.fromCharCode.apply(null, new Uint8Array(digest)))
                .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }

        // ==========================================
        // 3. 发起授权登录请求
        // ==========================================
        async function startPKCEAuth() {
            try {
                document.querySelector('#loginOverlay button').innerText = "跳转中...";
                
                const codeVerifier = generateRandomString(64);
                sessionStorage.setItem('code_verifier', codeVerifier);
                
                const codeChallenge = await generateCodeChallenge(codeVerifier);
                const state = generateRandomString(16); 
                
                const authUrl = `https://www.coze.cn/api/permission/oauth2/authorize?response_type=code&client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&code_challenge=${codeChallenge}&code_challenge_method=S256&state=${state}`;
                
                window.location.href = authUrl;
            } catch (error) {
                alert("跳转前发生错误: " + error.message);
                document.querySelector('#loginOverlay button').innerText = "🚀 点击授权登录";
            }
        }

        // ==========================================
        // 4. 处理授权回跳拿 Token
        // ==========================================
        async function handleAuthCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            
            if (code) {
                document.getElementById('loginOverlay').innerHTML = '<h2>正在获取安全令牌...</h2>';
                const codeVerifier = sessionStorage.getItem('code_verifier');
                
                try {
                    const response = await fetch('https://api.coze.cn/api/permission/oauth2/token', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            client_id: CLIENT_ID,
                            grant_type: 'authorization_code',
                            code: code,
                            redirect_uri: REDIRECT_URI,
                            code_verifier: codeVerifier
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.access_token) {
                        globalAccessToken = data.access_token;
                        document.getElementById('loginOverlay').style.display = 'none';
                        document.getElementById('auth-status').style.display = 'inline';
                        // 清理地址栏
                        window.history.replaceState({}, document.title, REDIRECT_URI);
                    } else {
                        throw new Error(data.error_message || "未知错误");
                    }
                } catch (e) {
                    console.error('获取 Token 失败:', e);
                    document.getElementById('loginOverlay').innerHTML = `
                        <h2>授权失败</h2>
                        <p class="subtitle">${e.message}</p>
                        <button onclick="startPKCEAuth()">重新尝试</button>
                    `;
                }
            }
        }

        window.onload = handleAuthCallback;

        // ==========================================
        // 5. 正式调用大模型生图 (使用官方 OpenAPI 大门)
        // ==========================================
        async function generatePoster() {
            if (!globalAccessToken) {
                alert("请先完成授权登录！");
                return;
            }

            const btn = document.getElementById('generateBtn');
            const placeholder = document.getElementById('placeholderText');
            const resultImg = document.getElementById('resultImage');
            
            btn.disabled = true; 
            btn.innerText = '正在生成...大概需要10-20秒';

            // 按照官方 OpenAPI 的格式打包数据
            const apiPayload = {
                workflow_id: WORKFLOW_ID,
                parameters: {
                    product_name: document.getElementById('product_name').value,
                    interest_rate: document.getElementById('interest_rate').value,
                    product_period: document.getElementById('product_period').value,
                    start_amount: document.getElementById('start_amount').value,
                    custom_prompt: `一张高端商业银行海报。画面右侧是一位面带从容微笑的优雅亚洲女性，坐在飞机头等舱。左上角写着粗体大字“${document.getElementById('product_name').value}”，紧接着是巨大的红色加粗数字“${document.getElementById('interest_rate').value}”。8K超高清。`
                }
            };

            try {
                // 走官方主大门，原生支持跨域！
                const targetUrl = 'https://api.coze.cn/v1/workflow/run';
                
                const response = await fetch(targetUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${globalAccessToken}`, 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(apiPayload)
                });

                if (!response.ok) {
                    throw new Error(`HTTP 错误! 状态码: ${response.status}`);
                }

                const result = await response.json();
                console.log("扣子官方主接口返回:", result);

                // 拆解官方接口的数据找图片
                let imageUrl = null;
                if (result.code === 0 && result.data) {
                    try {
                        // 官方 API 的 data 通常是个字符串格式的 JSON，需要解析
                        const innerData = typeof result.data === 'string' ? JSON.parse(result.data) : result.data;
                        imageUrl = innerData.output_image || innerData.image_url; 
                    } catch (e) {
                        // 如果解析失败，暴力提取：直接去字符串里抓图片链接
                        const match = String(result.data).match(/https?:\/\/[^\s"']+\.(png|jpg|jpeg|webp)/i);
                        if(match) imageUrl = match[0];
                    }
                }

                if (imageUrl) {
                    resultImg.src = imageUrl;
                    resultImg.style.display = 'block';
                    placeholder.style.display = 'none';
                } else {
                    alert("接口调用成功，但在返回数据中未找到图片。请按 F12 检查控制台。");
                }
            } catch (error) {
                console.error("请求失败详情:", error);
                alert('生图请求发生网络错误：' + error.message);
            } finally {
                btn.disabled = false; 
                btn.innerText = 'Generate Image';
            }
        }
    </script>
</body>
</html>
