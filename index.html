<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanrunming AI Poster Generator</title>
    <style>
        /* 引入系统无衬线字体，保持极简高级感 */
        :root {
            --bg-color: #000000;
            --text-main: #ffffff;
            --text-muted: #888888;
            --border-color: #333333;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 顶部导航栏 */
        nav {
            padding: 24px 48px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border-color);
        }

        /* 主体布局：左右分栏 */
        main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            flex: 1;
        }

        /* 左侧：表单输入区 */
        .input-section {
            padding: 64px 48px;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        h1 {
            font-size: 48px;
            font-weight: 600;
            letter-spacing: -0.03em;
            margin: 0 0 16px 0;
            line-height: 1.1;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 18px;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        input, textarea {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 16px;
            font-size: 16px;
            border-radius: 4px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            border-color: var(--text-main);
        }

        .row {
            display: flex;
            gap: 16px;
        }

        .row .form-group {
            flex: 1;
        }

        /* 系统设置区域分隔线 */
        .divider {
            height: 1px;
            background-color: var(--border-color);
            margin: 8px 0 32px 0;
        }

        /* 纯黑白极简按钮 */
        button {
            background-color: var(--text-main);
            color: var(--bg-color);
            border: none;
            padding: 18px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 16px;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #333;
            color: #666;
            cursor: not-allowed;
        }

        /* 右侧：海报预览区 */
        .output-section {
            padding: 64px 48px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #050505;
        }

        .image-container {
            width: 100%;
            max-width: 500px;
            aspect-ratio: 2 / 3;
            border: 1px dashed var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            position: relative;
            overflow: hidden;
            border-radius: 8px;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .loader {
            display: none;
            font-size: 14px;
            letter-spacing: 0.1em;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        @media (max-width: 900px) {
            main { grid-template-columns: 1fr; }
            .input-section { border-right: none; border-bottom: 1px solid var(--border-color); }
        }
    </style>
</head>
<body>

    <nav>
        Hanrunming AI
    </nav>

    <main>
        <div class="input-section">
            <h1>Create<br>Poster.</h1>
            <p class="subtitle">输入核心参数，基于底层大模型的视觉引擎将为您自动构建高分辨率资产。</p>

            <div class="form-group">
                <label>API Token (Coze 鉴权秘钥)</label>
                <input type="password" id="api_token" placeholder="请在此粘贴您的 Token...">
            </div>

            <div class="divider"></div>

            <div class="form-group">
                <label>产品名称 (Product Name)</label>
                <input type="text" id="product_name" value="东亚银行个人大额存单">
            </div>

            <div class="row">
                <div class="form-group">
                    <label>核心数据 (Highlight Data)</label>
                    <input type="text" id="interest_rate" value="2.00%">
                </div>
                <div class="form-group">
                    <label>产品期限 (Period)</label>
                    <input type="text" id="product_period" value="二年期">
                </div>
            </div>

            <div class="form-group">
                <label>起存金额 (Starting Amount)</label>
                <input type="text" id="start_amount" value="人民币20万元起">
            </div>

            <button id="generateBtn" onclick="generatePoster()">Generate Image</button>
        </div>

        <div class="output-section">
            <div class="image-container" id="imageContainer">
                <span id="placeholderText">IMAGE PREVIEW</span>
                <span id="loader" class="loader">GENERATING...</span>
                <img id="resultImage" alt="Generated Poster">
            </div>
        </div>
    </main>

    <script>
        async function generatePoster() {
            // 获取表单 DOM 元素
            const apiToken = document.getElementById('api_token').value.trim();
            const productName = document.getElementById('product_name').value;
            const interestRate = document.getElementById('interest_rate').value;
            const productPeriod = document.getElementById('product_period').value;
            const startAmount = document.getElementById('start_amount').value;
            
            // 校验 Token 是否填写
            if (!apiToken) {
                alert("请先在上方输入框中填写您的 API Token！");
                return;
            }

            const btn = document.getElementById('generateBtn');
            const placeholder = document.getElementById('placeholderText');
            const loader = document.getElementById('loader');
            const resultImg = document.getElementById('resultImage');

            // UI 状态切换：加载中
            btn.disabled = true;
            btn.innerText = 'Processing...';
            placeholder.style.display = 'none';
            resultImg.style.display = 'none';
            loader.style.display = 'block';

            // 构建发给 Coze 的请求体
            const payload = {
                product_name: productName,
                product_description: "活出每刻，稳健增值。本产品已参加存款保险。",
                interest_rate: interestRate,
                start_amount: startAmount,
                product_period: productPeriod,
                reference_images: "",
                custom_prompt: `一张高端商业银行海报。画面右侧是一位面带从容微笑的优雅亚洲女性，穿着高质感的米白色真丝上衣，坐在飞机头等舱。左上角写着粗体大字“${productName}”，紧接着是巨大的红色加粗数字“${interestRate}”。底部预留出25%的纯色空间用于排版。8K超高清。`
            };

            try {
                // 发起 API 请求
                const response = await fetch('/api/run', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`HTTP 状态码: ${response.status}`);
                }

                const data = await response.json();
                console.log("接口完整返回数据:", data);

                // 解析 Coze 返回的图片 URL
                // Coze 工作流通常将输出放在 data.data 里面，你可以按 F12 在控制台查看具体字段名
                let imageUrl = null;
                if (data.data && data.data.output_image) {
                    imageUrl = data.data.output_image;
                } else if (data.output_image) {
                    imageUrl = data.output_image;
                }

                if (imageUrl) {
                    resultImg.src = imageUrl;
                    resultImg.style.display = 'block';
                    loader.style.display = 'none';
                } else {
                    alert("接口调用成功，但没有找到图片链接字段，请按 F12 检查控制台的返回值。");
                    loader.style.display = 'none';
                    placeholder.style.display = 'block';
                    placeholder.innerText = 'IMAGE NOT FOUND';
                }

            } catch (error) {
                console.error('出错了:', error);
                alert('请求失败：' + error.message + '\n\n如果提示跨域拦截 (CORS)，您可能需要使用浏览器允许跨域插件进行测试。');
                loader.style.display = 'none';
                placeholder.style.display = 'block';
                placeholder.innerText = 'ERROR OCCURRED';
            } finally {
                // UI 状态恢复
                btn.disabled = false;
                btn.innerText = 'Generate Image';
            }
        }
    </script>
</body>

</html>
