<script>
async function generatePoster() {
    const btn = document.getElementById('generateBtn');
    const placeholder = document.getElementById('placeholderText');
    const resultImg = document.getElementById('resultImage');

    btn.disabled = true;
    btn.innerText = '正在生成...';

    const payload = {
        product_name: document.getElementById('product_name').value,
        product_description: "高端商业银行海报生成",
        interest_rate: document.getElementById('interest_rate').value,
        product_period: document.getElementById('product_period').value,
        start_amount: document.getElementById('start_amount').value
    };

    try {
        const response = await fetch('/api/run', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (!response.ok) {
            throw new Error("服务器错误: " + response.status);
        }

        const result = await response.json();
        console.log("后端返回:", result);

        // 🔥 关键改动：不再判断 result.code
        // 直接在整个返回体里搜索图片链接

        const jsonStr = JSON.stringify(result);

        const match = jsonStr.match(/https?:\/\/[^\s"']+\.(png|jpg|jpeg|webp)/i);

        if (match) {
            resultImg.src = match[0];
            resultImg.style.display = 'block';
            placeholder.style.display = 'none';
        } else {
            alert("生成成功，但没有找到图片链接。请查看控制台。");
        }

    } catch (error) {
        console.error(error);
        alert("请求失败：" + error.message);
    } finally {
        btn.disabled = false;
        btn.innerText = 'Generate Image';
    }
}
</script>
